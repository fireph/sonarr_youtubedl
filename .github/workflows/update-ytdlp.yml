name: Update yt-dlp

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  update-ytdlp:
    runs-on: ubuntu-latest
    steps:
      # https://github.com/actions/checkout
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.x"

      - name: Update pinned yt-dlp version
        id: update
        run: |
          LATEST_VERSION="$(
            python3 - <<'PY'
          import json
          import urllib.request

          with urllib.request.urlopen(
              "https://pypi.org/pypi/yt-dlp/json", timeout=30
          ) as response:
              print(json.load(response)["info"]["version"])
          PY
          )"

          uv add --no-sync "yt-dlp[curl-cffi,default]==${LATEST_VERSION}"

          echo "version=${LATEST_VERSION}" >> "$GITHUB_OUTPUT"
          if git diff --quiet -- pyproject.toml uv.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push changes
        if: steps.update.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pyproject.toml uv.lock
          git commit -m "Update yt-dlp to ${{ steps.update.outputs.version }}"
          git push

      # GITHUB_TOKEN pushes do not start another workflow, so dispatch the
      # Docker workflow explicitly after the version commit is pushed.
      - name: Trigger Docker build
        if: steps.update.outputs.changed == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'main.yaml',
              ref: 'main'
            })
